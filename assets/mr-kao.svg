<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 250" role="img" aria-labelledby="title desc">
  <title id="title">Mr Kao Logo</title>
  <desc id="desc">Stilisierte Wortmarke Mr Kao nach der Restaurantbeschilderung</desc>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)" stroke="#10182f" stroke-linecap="round" stroke-linejoin="round">
    <!-- fork detail used in the restaurant sign -->
    <g fill="none" stroke-width="9">
      <path d="M52 52v106"/>
      <path d="M34 52v38M46 52v38M58 52v38M70 52v38"/>
      <path d="M34 90c0 20 36 20 36 0"/>
    </g>
    <!-- K outline -->
    <path d="M96 50v112M99 111l83-61M100 112l88 50" fill="none" stroke-width="24"/>
    <path d="M96 50v112M99 111l83-61M100 112l88 50" fill="none" stroke="#f7f5ef" stroke-width="12"/>
    <!-- A -->
    <path d="M229 160L282 50l53 110h-29l-12-29h-28l-12 29z" fill="#10182f" stroke-width="3"/>
    <ellipse cx="281" cy="102" rx="13" ry="17" fill="#f7f5ef" stroke="none"/>
    <!-- O with equals sign -->
    <ellipse cx="424" cy="108" rx="66" ry="64" fill="#10182f" stroke-width="3"/>
    <path d="M391 91h66M391 124h66" stroke="#f7f5ef" stroke-width="14"/>
  </g>
  <text x="42" y="224" fill="#10182f" font-family="Arial Black,Arial,sans-serif" font-size="52" letter-spacing="3">MR</text>
</svg>
